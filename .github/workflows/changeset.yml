name: Changeset

on:
  pull_request:
    branches: [main]

jobs:
  changeset:
    name: Changeset present
    runs-on: ubuntu-latest
    # Skip on the auto-generated release PR (it consumes all changesets).
    if: "github.head_ref != 'changeset-release/main'"

    env:
      HUSKY_SKIP: true

    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need full history so `changeset status --since=origin/main` can diff.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: "npm"

      # `--ignore-scripts` neutralizes postinstall/prepare scripts in deps —
      # the Shai-Hulud worm foothold. See SECURITY.md.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Block PRs that newly introduce dependencies with known advisories
      # before they reach `main`.
      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high

      # Fails the PR if no changeset describes the change.
      # Add one with `npm run changeset` (or `npm run changeset:empty` for
      # PRs that don't need a release entry) and commit it.
      # We check `.changesets` (not `.releases`) so that empty changesets
      # — which have 0 package bumps but still document the PR — pass.
      - name: Verify changeset is present
        run: |
          npx changeset status --since=origin/main --output=/tmp/cs.json
          if [ "$(jq '.changesets | length' /tmp/cs.json)" -eq 0 ]; then
            echo "::error::No changeset found on this PR. Run 'npm run changeset' (or 'npm run changeset:empty' for PRs that don't need a release entry) and commit the file."
            exit 1
          fi
